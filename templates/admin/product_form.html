{% extends 'admin/base.html' %}

{% block header %}{{ 'Edit Product' if product else 'Add New Product' }}{% endblock %}
{% block header_actions %}
<a href="{{ url_for('admin_products') }}" class="btn btn-outline" style="font-size: 0.85rem;">← Back</a>
{% endblock %}

{% block content %}
<div style="background: white; padding: 2.5rem; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); max-width: 800px;">
    <form method="POST" id="product-form">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group" style="grid-column: span 2;">
                <label style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; font-size: 0.85rem;">Product Name *</label>
                <input type="text" name="name" class="form-control" required value="{{ product.name if product else '' }}" id="product-name">
            </div>
            
            <div class="form-group">
                <label style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; font-size: 0.85rem;">Category *</label>
                <select name="category_id" class="form-control" required id="product-category">
                    <option value="">Select a category</option>
                    {% for cat in categories %}
                        <option value="{{ cat.category_id }}" {% if product and product.category_id == cat.category_id %}selected{% endif %}>{{ cat.category_name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; font-size: 0.85rem;">Image URL</label>
                <input type="text" name="image_url" class="form-control" placeholder="https://example.com/image.jpg" value="{{ product.image_url if product else '' }}" id="product-image">
            </div>
            
            <div class="form-group">
                <label style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; font-size: 0.85rem;">Price ($) *</label>
                <input type="number" step="0.01" min="0" name="price" class="form-control" required value="{{ product.price if product else '' }}" id="product-price">
            </div>
            
            <div class="form-group">
                <label style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; font-size: 0.85rem;">Stock Quantity *</label>
                <input type="number" min="0" name="stock_quantity" class="form-control" required value="{{ product.stock_quantity if product else '' }}" id="product-stock">
            </div>
            
            <div class="form-group" style="grid-column: span 2;">
                <label style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; display: block; font-size: 0.85rem;">Description</label>
                <textarea name="description" class="form-control" rows="5" id="product-description">{{ product.description if product else '' }}</textarea>
            </div>
            
            <div style="grid-column: span 2;">
                <button type="submit" class="btn btn-primary" id="product-submit" style="font-size: 1rem; width: 100%; padding: 0.9rem;">{{ '💾 Save Changes' if product else '🌱 Create Product' }}</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
