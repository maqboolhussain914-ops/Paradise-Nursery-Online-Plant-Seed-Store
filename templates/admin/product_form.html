{% extends 'admin/base.html' %}

{% block header %}{{ 'Edit Product' if product else 'Add New Product' }}{% endblock %}
{% block header_actions %}
<a href="{{ url_for('admin_products') }}" class="btn btn-outline">Cancel</a>
{% endblock %}

{% block content %}
<div style="background: white; padding: 2rem; border-radius: 15px; box-shadow: var(--shadow-sm); max-width: 800px;">
    <form method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group" style="grid-column: span 2;">
                <label style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; display: block;">Product Name *</label>
                <input type="text" name="name" class="form-control" required value="{{ product.name if product else '' }}">
            </div>
            
            <div class="form-group">
                <label style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; display: block;">Category *</label>
                <select name="category_id" class="form-control" required>
                    <option value="">Select a category</option>
                    {% for cat in categories %}
                        <option value="{{ cat.category_id }}" {% if product and product.category_id == cat.category_id %}selected{% endif %}>{{ cat.category_name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; display: block;">Image URL</label>
                <input type="text" name="image_url" class="form-control" placeholder="https://example.com/image.jpg" value="{{ product.image_url if product else '' }}">
            </div>
            
            <div class="form-group">
                <label style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; display: block;">Price ($) *</label>
                <input type="number" step="0.01" min="0" name="price" class="form-control" required value="{{ product.price if product else '' }}">
            </div>
            
            <div class="form-group">
                <label style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; display: block;">Stock Quantity *</label>
                <input type="number" min="0" name="stock_quantity" class="form-control" required value="{{ product.stock_quantity if product else '' }}">
            </div>
            
            <div class="form-group" style="grid-column: span 2;">
                <label style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; display: block;">Description</label>
                <textarea name="description" class="form-control" rows="5">{{ product.description if product else '' }}</textarea>
            </div>
            
            <div style="grid-column: span 2;">
                <button type="submit" class="btn btn-primary" style="font-size: 1.1rem; width: 100%;">{{ 'Save Changes' if product else 'Create Product' }}</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
