{% extends 'admin/base.html' %}

{% block header %}Dashboard Overview{% endblock %}

{% block content %}
<div style="display: flex; gap: 2rem; margin-bottom: 3rem;">
    <div class="stat-card">
        <h3 style="color: var(--text-secondary); font-size: 1rem; margin-bottom: 0.5rem;">Total Products</h3>
        <div class="stat-value">{{ stats.products }}</div>
    </div>
    <div class="stat-card">
        <h3 style="color: var(--text-secondary); font-size: 1rem; margin-bottom: 0.5rem;">Total Orders</h3>
        <div class="stat-value">{{ stats.orders }}</div>
    </div>
    <div class="stat-card">
        <h3 style="color: var(--text-secondary); font-size: 1rem; margin-bottom: 0.5rem;">Total Revenue</h3>
        <div class="stat-value">${{ "%.2f"|format(stats.revenue) }}</div>
    </div>
</div>

<div style="background: white; padding: 2rem; border-radius: 15px; box-shadow: var(--shadow-sm);">
    <h3 style="margin-bottom: 1rem; color: var(--primary-dark);">Quick Actions</h3>
    <div style="display: flex; gap: 1rem;">
        <a href="{{ url_for('admin_add_product') }}" class="btn btn-primary">Add New Product</a>
        <a href="{{ url_for('admin_orders') }}" class="btn btn-outline">View Recent Orders</a>
    </div>
</div>
{% endblock %}
